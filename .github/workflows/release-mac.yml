name: Release macOS app

# Builds the unsigned skillctl desktop app (.dmg + .zip) for Apple Silicon and
# Intel. Runs on a version tag (v*) or manually. No code signing / notarization
# yet — see the README for how to open an unsigned build.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @skillctl/core build

      - name: Build renderer & main
        run: pnpm --filter skillctl-electron-shell build

      - name: Package unsigned dmg + zip (arm64 + x64)
        # identity is already null in electron-builder.yml; this env makes the
        # "no signing" explicit so CI never tries to auto-discover a certificate.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm --filter skillctl-electron-shell exec electron-builder --mac --arm64 --x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillctl-macos
          path: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
